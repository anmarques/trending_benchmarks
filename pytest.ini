[pytest]
# Pytest configuration for Benchmark Intelligence System

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    source_discovery: tests for source discovery (Phase 10.1)
    benchmark_extraction: tests for benchmark extraction (Phase 10.2)
    taxonomy_generation: tests for taxonomy generation (Phase 10.3)
    report_generation: tests for report generation (Phase 10.4)

# Coverage options (if using pytest-cov)
# Run with: pytest --cov=agents --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (if using pytest-timeout)
# timeout = 300

# Parallel execution (if using pytest-xdist)
# Run with: pytest -n auto
