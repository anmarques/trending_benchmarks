[pytest]
# Pytest configuration for trending_benchmarks

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Console output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for different test types
markers =
    unit: Unit tests for individual modules
    integration: Integration tests for full pipeline
    slow: Tests that take significant time
    requires_api: Tests that require API credentials

# Coverage options (when using pytest-cov)
[coverage:run]
source = agents/benchmark_intelligence
omit =
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
