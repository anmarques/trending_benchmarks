# Target model creators/organizations to track
labs:
  - Qwen
  - MinimaxAI
  - 01-ai  # Yi models
  - meta-llama
  - mistralai
  - google
  - microsoft
  - anthropic
  - alibaba-pai
  - tencent
  - deepseek-ai
  - OpenGVLab
  - THUDM  # ChatGLM
  - baichuan-inc
  - internlm
  - huggingface

# Discovery settings
discovery:
  models_per_lab: 5  # Top N models per lab (reduced for faster first run)
  sort_by: "downloads"  # Options: downloads, trending, lastModified
  filter_tags: []  # Empty = no tag filtering
  min_downloads: 0  # No minimum (get all models)

# Cadence settings
schedule:
  frequency: "monthly"  # monthly, weekly, daily
  day_of_month: 1
  hour: 9
