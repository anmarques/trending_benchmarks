# Target model creators/organizations to track
# Only include labs that produce LLMs, VLMs, and audio-language models
labs:
  - Qwen
  - MinimaxAI
  - 01-ai  # Yi models
  - meta-llama
  - mistralai
  - google
  - microsoft
  - anthropic
  - alibaba-pai
  - tencent
  - deepseek-ai
  - OpenGVLab
  - THUDM  # ChatGLM
  - baichuan-inc
  - internlm
  # Note: "huggingface" removed - gets irrelevant time-series/BERT models

# Discovery settings
discovery:
  models_per_lab: 15  # Increased for better coverage
  sort_by: "downloads"  # Options: downloads, trending, lastModified

  # Task/pipeline tag filters (empty = no filtering)
  # Common tags: text-generation, text2text-generation, image-text-to-text,
  # zero-shot-image-classification, automatic-speech-recognition
  filter_tags:
    - "text-generation"       # LLMs
    - "image-text-to-text"    # VLMs
    - "text2text-generation"  # Some LLMs use this

  # Additional filters
  min_downloads: 10000       # Skip low-usage models
  date_filter_months: 12     # Only models from last 12 months

  # Skip models with these tags (noise reduction)
  exclude_tags:
    - "time-series-forecasting"
    - "fill-mask"
    - "token-classification"

# Cadence settings
schedule:
  frequency: "monthly"  # monthly, weekly, daily
  day_of_month: 1
  hour: 9
