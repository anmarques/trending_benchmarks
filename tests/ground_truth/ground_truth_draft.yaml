# Expected System Behavior
expected_consolidation:
  - benchmark_group: "MMLU"
    variants_found: ["MMLU", "mmlu"]  # System should detect and consolidate
    canonical_name: "MMLU"  # Uppercase should win

  - benchmark_group: "HumanEval"
    variants_found: ["HumanEval", "Multipl-E HumanEval"]
    note: "Should treat as distinct (side-by-side in same document)"

