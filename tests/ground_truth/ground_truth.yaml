expected_behavior:
  consolidation:
  - benchmark_group: MMLU
    variants_found:
    - MMLU
    - mmlu
    - MMLU-Pro
    - MMLU-redux
    - MMLU-stem
    should_consolidate: false
    reason: MMLU-Pro, MMLU-redux, MMLU-stem are distinct variants (side-by-side in
      same documents)
  - benchmark_group: HumanEval
    variants_found:
    - HumanEval
    - HumanEval+
    - Multipl-E HumanEval
    should_consolidate: false
    reason: HumanEval+ and Multipl-E HumanEval are distinct variants
  - benchmark_group: MBPP
    variants_found:
    - MBPP
    - MBPP+
    - MBPP++
    - Multipl-E MBPP
    should_consolidate: false
    reason: All are distinct variants found side-by-side
