# Target model creators/organizations to track
# Only include labs that produce LLMs, VLMs, and audio-language models
labs:
  - Qwen
  - MinimaxAI
  - 01-ai  # Yi models
  - meta-llama
  - mistralai
  - google
  - microsoft
  - anthropic
  - alibaba-pai
  - tencent
  - deepseek-ai
  - OpenGVLab
  - THUDM  # ChatGLM
  - baichuan-inc
  - internlm
  # Note: "huggingface" removed - gets irrelevant time-series/BERT models

# Discovery settings
discovery:
  models_per_lab: 15  # Increased for better coverage
  sort_by: "downloads"  # Options: downloads, trending, lastModified

  # Task/pipeline tag filters (empty = no filtering at API level, filter after)
  # Leave empty to get all models, then filter by exclude_tags
  filter_tags: []

  # Additional filters
  min_downloads: 10000       # Skip low-usage models
  date_filter_months: 12     # Only models from last 12 months

  # Skip models with these tags (noise reduction)
  # These are applied AFTER fetching to exclude irrelevant model types
  exclude_tags:
    - "time-series-forecasting"
    - "fill-mask"
    - "token-classification"
    - "table-question-answering"
    - "zero-shot-classification"

# Cadence settings
schedule:
  frequency: "monthly"  # monthly, weekly, daily
  day_of_month: 1
  hour: 9

# PDF parsing constraints
pdf_constraints:
  max_file_size_mb: 10
  download_timeout_seconds: 120
  max_extracted_chars: 50000

# Retry policy configuration
retry_policy:
  max_attempts: 3
  initial_delay_seconds: 1
  backoff_multiplier: 2
  max_delay_seconds: 60

# Temporal tracking configuration
temporal_tracking:
  timeframe_months: 12

# Parallelization configuration
parallelization:
  max_concurrent_document_fetches: 5
  enabled: true
  timeout_per_document_seconds: 60

# Lab to GitHub organization mapping
# Maps lab names (from HuggingFace) to their GitHub organization names
# for reliable README/PDF fetching
lab_github_mappings:
  Qwen: QwenLM
  meta-llama: meta-llama
  mistralai: mistralai
  google: google
  microsoft: microsoft
  anthropic: anthropics
  alibaba-pai: alibaba
  tencent: Tencent
  deepseek-ai: deepseek-ai
  OpenGVLab: OpenGVLab
  THUDM: THUDM
  baichuan-inc: baichuan-inc
  internlm: InternLM
  01-ai: 01-ai
  MinimaxAI: MiniMaxAI
