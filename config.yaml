# Target model creators/organizations to track
# Only include labs that produce LLMs, VLMs, and audio-language models
labs:
  - Qwen
  - MinimaxAI
  - meta-llama
  - mistralai
  - google
  - microsoft
  - anthropic
  - tencent
  - deepseek-ai
  - nvidia
  - openai
  - arcee-ai
  - moonshotai
  - LiquidAI
  - nvidia
  - zai-org
  - ibm-granite
  - sarvam-ai

# Discovery settings
discovery:
  models_per_lab: 15  # Increased for better coverage
  sort_by: "downloads"  # Options: downloads, trending, lastModified

  # Task/pipeline tag filters (empty = no filtering at API level, filter after)
  # Leave empty to get all models, then filter by exclude_tags
  filter_tags: []

  # Additional filters
  min_downloads: 1000        # Skip low-usage models
  date_filter_months: 12     # Only models from last 12 months

  # Skip models with these tags (noise reduction)
  # These are applied AFTER fetching to exclude irrelevant model types
  exclude_tags:
    - "time-series-forecasting"
    - "fill-mask"
    - "token-classification"
    - "table-question-answering"
    - "zero-shot-classification"

# PDF parsing constraints
pdf_constraints:
  max_file_size_mb: 10
  download_timeout_seconds: 120
  max_extracted_chars: 50000

# Retry policy configuration
retry_policy:
  max_attempts: 3
  initial_delay_seconds: 1
  backoff_multiplier: 2
  max_delay_seconds: 60

# Temporal tracking configuration
temporal_tracking:
  timeframe_months: 12

# Parallelization configuration
parallelization:
  max_concurrent_document_fetches: 5
  enabled: true
  timeout_per_document_seconds: 60

# Benchmark consolidation configuration (T079)
consolidation:
  fuzzy_match_threshold: 0.90  # Threshold for treating benchmark names as same (0.0-1.0)
  enable_web_search: true      # Enable web search disambiguation for ambiguous pairs
  web_search_max_results: 3    # Number of search results to analyze

  # AI review threshold for questionable cases (0.70-0.89 similarity)
  ai_review_min_similarity: 0.70  # Below this, definitely different benchmarks
  ai_review_max_similarity: 0.89  # Above this, use fuzzy_match_threshold logic

  # Benchmark aliases - known alternate names that should consolidate to canonical form
  # Format: "alternate_name": "canonical_name"
  benchmark_aliases:
    # ARC variants
    "ARC-C": "ARC-Challenge"
    "ARC-c": "ARC-Challenge"
    "ARC Challenge": "ARC-Challenge"
    "ARC challenge": "ARC-Challenge"
    "arc-challenge": "ARC-Challenge"

    # BBH variants
    "BBH": "BIG-Bench Hard"
    "Big-Bench Hard": "BIG-Bench Hard"
    "BigBench Hard": "BIG-Bench Hard"

    # GSM8K variants (hyphen handling)
    "GSM8K": "GSM-8K"
    "gsm8k": "GSM-8K"

    # IFEval variants (capitalization)
    "IFeval": "IFEval"
    "Ifeval": "IFEval"
    "ifeval": "IFEval"

    # AIME variants (year formats)
    "AIME24": "AIME 2024"
    "AIME-24": "AIME 2024"
    "AIME'24": "AIME 2024"
    "AIME'24": "AIME 2024"
    "MT-AIME24": "AIME 2024"
    "MT-AIME-24": "AIME 2024"
    "AIME 24": "AIME 2024"

    "AIME25": "AIME 2025"
    "AIME-25": "AIME 2025"
    "AIME'25": "AIME 2025"
    "AIME'25": "AIME 2025"
    "MT-AIME25": "AIME 2025"
    "MT-AIME-25": "AIME 2025"
    "AIME 25": "AIME 2025"

    # Add more known aliases as discovered

